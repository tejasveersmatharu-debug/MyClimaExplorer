<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="style/style.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClima</title>
</head>
<body>
    <div class="header">
        <h1>MyClimaExplorer</h1>
        <p>tagline...</p>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="side-box">
                <div class="sidebar_header">
                <h2>Sidebar</h2>
                <div class="instruct">
                    <p>Instructions</p>
                </div>
                </div>
                <div class="sidebar_body">
                    <div class="temperature btn">
                        <button id="temp_btn">Temperature</button>
                    </div>
                    <div class="precipitation btn">
                        <button id="rain_btn">Precipitation</button>
                    </div>
                    <div class="humidity btn">
                        <button id="humidity">Humidity</button>
                    </div>
                    <div class="wind btn">
                        <button id="wind btn">Wind</button>
                    </div>
                    <div class="data-show btn">
                        <button id="data_show">Show Data</button>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- graphs and heatmap -->
        <div class="visual">

            <div class="visual_box">
                <div class="upload">
                    <div class="upload_file">
                    <label for="upload-btn" class="upload-label">Select .nc File</label>
                    <input type="file" id="upload-btn" accept=".nc" style="display:none;">
                </div>
                </div>
                <div class="total">
                    <div class="total_heatmap">
                        <div class="total_heatmap_box">

                        </div>
                    </div>
                    <div class="total_graph">
                        <div class="total_graph_box">

                        </div>
                    </div>
                </div>
                <div class="yearly">
                    <div class="yearly_heatmap">
                        <div class="yearly_heatmap_box">

                        </div>
                    </div>
                    <div class="yearly_graph">
                        <div class="yearly_graph_box">
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- data show -->
        <div class="data_box">

        </div>
    </div>
    <div class="footer">

    </div>
    <script src="app.js"></script>
</body>
</html>
